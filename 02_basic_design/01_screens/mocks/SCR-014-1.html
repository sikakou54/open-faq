<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:#3a3f46;-webkit-font-smoothing:antialiased}
#wrap{display:inline-block}
.scr-mock,.screen{background:#fff}
.le-cap{font-size:12px;font-weight:700;color:#16191d;margin:0 0 8px}
.screen{border:1px solid #e6e8eb;border-radius:12px;overflow:hidden;width:1024px}
.screen-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fbfbfc;border-bottom:1px solid #eef0f2;font-size:12px}
.scr-name{font-weight:700;color:#16191d}.scr-user{color:#8a9099;font-size:11px}
.modal-overlay{background:rgba(16,24,40,.35);padding:28px;display:flex;justify-content:center}
.modal-card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.18);padding:22px}
.panel{border:1px solid #eef0f2;border-radius:9px;padding:12px;margin:10px 0;background:#fbfbfc}
.panel-title{font-weight:700;font-size:12px;margin-bottom:6px}
.field{margin:10px 0;font-size:12px}.req{color:#e5484d}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.primary{background:#5e6ad2;color:#fff}
.link{color:#5e6ad2;text-decoration:none}
input[type=checkbox]{transform:translateY(1px)}
table{border-collapse:collapse}
</style>

</head><body><div id="wrap"><div style="background:#f5f6f8;padding:24px;border-radius:12px;font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;color:#3a3f46;--accent:#5e6ad2;--row-pad:14px"><div style="max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:28px"><section style="flex:none;width:368px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px"><span style="font-size:11px;font-weight:700;color:var(--accent,#5e6ad2);background:color-mix(in srgb,var(--accent,#5e6ad2) 10%,#fff);border-radius:6px;padding:3px 8px">009-001</span><span style="font-size:13px;font-weight:600;color:#16191d">メンバー招待</span></div>
      <div style="height:500px;background:rgba(22,25,29,.42);border:1px solid #e6e8eb;border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.05);display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden">
        <div style="width:320px;background:#fff;border-radius:14px;box-shadow:0 20px 50px rgba(16,24,40,.3);overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #eef0f2"><span style="font-size:15px;font-weight:700;color:#16191d">メンバーを招待</span><span style="width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#9aa0a8;cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg></span></div>
          <div style="padding:18px;display:flex;flex-direction:column;gap:16px">
            <div><label style="display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:6px">メールアドレス<span style="color:#e5484d;margin-left:3px">●</span></label><div style="height:38px;border:1px solid #e6e8eb;border-radius:8px;background:#fbfbfc;display:flex;align-items:center;padding:0 11px;font-size:12.5px;color:#b5bac0">member@example.com</div></div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid #eef0f2;background:#fbfbfc"><button style="padding:8px 14px;border:1px solid #e6e8eb;border-radius:8px;background:#fff;font-size:12.5px;font-weight:600;color:#3a3f46;cursor:pointer;font-family:inherit">キャンセル</button><button style="padding:8px 16px;border:none;border-radius:8px;background:var(--accent,#5e6ad2);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit">招待メールを送信する</button></div>
        </div>
      </div>
    </section></div></div></div></body></html>
