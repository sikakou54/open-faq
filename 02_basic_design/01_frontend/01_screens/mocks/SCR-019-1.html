<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:#3a3f46;-webkit-font-smoothing:antialiased}
#wrap{display:inline-block}
.scr-mock,.screen{background:#fff}
.le-cap{font-size:12px;font-weight:700;color:#16191d;margin:0 0 8px}
.screen{border:1px solid #e6e8eb;border-radius:12px;overflow:hidden;width:1024px}
.screen-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fbfbfc;border-bottom:1px solid #eef0f2;font-size:12px}
.scr-name{font-weight:700;color:#16191d}.scr-user{color:#8a9099;font-size:11px}
.modal-overlay{background:rgba(16,24,40,.35);padding:28px;display:flex;justify-content:center}
.modal-card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.18);padding:22px}
.panel{border:1px solid #eef0f2;border-radius:9px;padding:12px;margin:10px 0;background:#fbfbfc}
.panel-title{font-weight:700;font-size:12px;margin-bottom:6px}
.field{margin:10px 0;font-size:12px}.req{color:#e5484d}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.primary{background:#5e6ad2;color:#fff}
.link{color:#5e6ad2;text-decoration:none}
input[type=checkbox]{transform:translateY(1px)}
table{border-collapse:collapse}
</style>

</head><body><div id="wrap"><div style="background:#f5f6f8;font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;color:#3a3f46;--accent:#5e6ad2">

<!-- ===== ページ本文 ===== -->
<div style="padding:24px 24px 0;max-width:760px">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span style="font-size:11px;font-weight:700;color:#b42318;background:#fdecea;border-radius:6px;padding:3px 8px">SCR-019</span>
    <span style="font-size:14px;font-weight:600;color:#16191d">退会申請</span>
  </div>

  <!-- ナビ -->
  <nav style="display:flex;align-items:center;gap:7px;font-size:12px;color:#9aa0a8;margin-bottom:18px">
    <span>設定</span><span>/</span><span style="color:#3a3f46">退会</span>
  </nav>

  <h1 style="margin:0 0 16px;font-size:20px;font-weight:700;color:#16191d">契約を退会する</h1>

  <!-- IT-01: 注意事項 -->
  <div style="display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border:1px solid #f5c2bd;background:#fdecea;border-radius:10px;color:#b42318;font-size:12px;line-height:1.7;margin-bottom:20px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:2px"><path d="M10.3 4 2.5 18a1.7 1.7 0 0 0 1.5 2.6h16a1.7 1.7 0 0 0 1.5-2.6L13.7 4a1.7 1.7 0 0 0-3 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    <div>
      <div style="font-weight:700;margin-bottom:4px">退会前にご確認ください</div>
      <ul style="margin:0;padding-left:16px">
        <li>当月末でサービスを停止します</li>
        <li>当月末日 + 30 日に全データを完全削除します(復元不可)</li>
        <li>当月分の従量課金は通常請求・次月以降の請求はありません</li>
        <li>全メンバーのアクセス権が当月末で失効し、招待中メンバーは自動キャンセルされます</li>
      </ul>
    </div>
  </div>

  <!-- IT-02: 退会理由(任意) -->
  <div style="margin-bottom:20px">
    <label style="display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:6px">
      退会理由(任意・最大 500 文字)
    </label>
    <textarea style="width:100%;height:96px;border:1px solid #e6e8eb;border-radius:8px;background:#fff;padding:10px 12px;font-size:13px;font-family:inherit;color:#b5bac0;resize:vertical;line-height:1.6" placeholder="退会理由をご入力ください(任意)"></textarea>
  </div>

  <!-- IT-03 / IT-04: ボタン行 -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
    <button style="height:44px;padding:0 20px;border:none;border-radius:9px;background:#d92d20;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">退会を申請する</button>
    <button style="height:40px;padding:0 18px;border:1px solid #e6e8eb;border-radius:9px;background:#fff;color:#3a3f46;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">個人設定へ戻る</button>
  </div>
</div>

<!-- ===== 確認ダイアログ(モーダル) ===== -->
<div style="position:relative;background:rgba(16,24,40,.35);padding:24px 24px 28px;display:flex;justify-content:center">
  <!-- ラベル -->
  <div style="position:absolute;top:10px;left:16px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.35);border-radius:4px;padding:2px 7px;letter-spacing:.5px">確認ダイアログ(EV-03 押下後)</div>

  <div style="background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.22);padding:24px;width:460px">
    <!-- ダイアログヘッダ -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b42318" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 4 2.5 18a1.7 1.7 0 0 0 1.5 2.6h16a1.7 1.7 0 0 0 1.5-2.6L13.7 4a1.7 1.7 0 0 0-3 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <span style="font-size:15px;font-weight:700;color:#16191d">退会内容の確認</span>
    </div>
    <p style="font-size:12px;color:#6b7280;margin:0 0 16px;line-height:1.6">退会を確定する前に、以下の内容を確認してください。確認のため契約名の入力と再認証が必要です。</p>

    <!-- IT-05: 契約名確認入力 -->
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:5px">
        確認のため契約名 <code style="font-family:ui-monospace,Menlo,monospace;color:#b42318;background:#fdecea;padding:1px 5px;border-radius:4px">Acme Inc.</code> を入力
      </label>
      <input type="text" placeholder="契約名を入力" style="width:100%;height:38px;border:1px solid #e6e8eb;border-radius:8px;background:#fff;padding:0 12px;font-size:13px;font-family:inherit;color:#16191d">
    </div>

    <!-- IT-06: パスワード再入力 -->
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:5px">
        パスワードを再入力(本人確認)
      </label>
      <input type="password" placeholder="パスワード" value="••••••••" style="width:100%;height:38px;border:1px solid #e6e8eb;border-radius:8px;background:#fbfbfc;padding:0 12px;font-size:13px;font-family:inherit;color:#16191d;letter-spacing:2px">
    </div>

    <!-- ダイアログボタン行 -->
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <!-- IT-07: キャンセル -->
      <button style="height:38px;padding:0 18px;border:1px solid #e6e8eb;border-radius:9px;background:#fff;color:#3a3f46;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">キャンセル</button>
      <!-- OK(退会を確定) -->
      <button style="height:38px;padding:0 18px;border:none;border-radius:9px;background:#d92d20;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">退会を確定する</button>
    </div>
  </div>
</div>

</div></body></html>
