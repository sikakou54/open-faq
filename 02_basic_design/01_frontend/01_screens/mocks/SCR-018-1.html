<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:#3a3f46;-webkit-font-smoothing:antialiased}
#wrap{display:inline-block}
.scr-mock,.screen{background:#fff}
.le-cap{font-size:12px;font-weight:700;color:#16191d;margin:0 0 8px}
.screen{border:1px solid #e6e8eb;border-radius:12px;overflow:hidden;width:1024px}
.screen-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fbfbfc;border-bottom:1px solid #eef0f2;font-size:12px}
.scr-name{font-weight:700;color:#16191d}.scr-user{color:#8a9099;font-size:11px}
.modal-overlay{background:rgba(16,24,40,.35);padding:28px;display:flex;justify-content:center}
.modal-card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.18);padding:22px}
.panel{border:1px solid #eef0f2;border-radius:9px;padding:12px;margin:10px 0;background:#fbfbfc}
.panel-title{font-weight:700;font-size:12px;margin-bottom:6px}
.field{margin:10px 0;font-size:12px}.req{color:#e5484d}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.primary{background:#5e6ad2;color:#fff}
.link{color:#5e6ad2;text-decoration:none}
input[type=checkbox]{transform:translateY(1px)}
table{border-collapse:collapse}
</style>

</head><body><div id="wrap"><div style="background:#f5f6f8;padding:24px;border-radius:12px;font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;color:#3a3f46;--accent:#5e6ad2;--row-pad:14px"><div style="max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:28px"><section style="flex:none;width:360px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px"><span style="font-size:11px;font-weight:700;color:var(--accent,#5e6ad2);background:color-mix(in srgb,var(--accent,#5e6ad2) 10%,#fff);border-radius:6px;padding:3px 8px">SCR-018</span><span style="font-size:13px;font-weight:600;color:#16191d">メール確認</span></div>
      <div style="height:500px;background:radial-gradient(120% 80% at 50% 0%,color-mix(in srgb,var(--accent,#5e6ad2) 7%,#fff) 0%,#fbfbfc 60%);border:1px solid #e6e8eb;border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.05);display:flex;align-items:center;justify-content:center;padding:24px">
        <div style="width:300px;background:#fff;border:1px solid #eef0f2;border-radius:14px;box-shadow:0 4px 18px rgba(16,24,40,.06);padding:30px 24px;text-align:center">
          <div style="width:56px;height:56px;border-radius:999px;background:color-mix(in srgb,var(--accent,#5e6ad2) 10%,#fff);color:var(--accent,#5e6ad2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></div>
          <h2 style="margin:0 0 10px;font-size:16px;font-weight:700;color:#16191d">確認メールを送信しました</h2>
          <p style="margin:0 0 6px;font-size:12.5px;color:#71767e;line-height:1.7"><b style="color:#16191d">owner@example.com</b> 宛に確認リンクをお送りしました。メール内のリンクをクリックして登録を完了してください。</p>
          <div style="margin-top:18px;padding-top:16px;border-top:1px solid #f1f3f5;font-size:12px;color:#71767e">メールが届かない場合は <a style="color:var(--accent,#5e6ad2);text-decoration:none;cursor:pointer;font-weight:600">再送信</a></div>
        </div>
      </div>
    </section></div></div></div></body></html>
