<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:#3a3f46;-webkit-font-smoothing:antialiased}
#wrap{display:inline-block}
.ov{background:rgba(16,24,40,.35);padding:34px 28px 28px;display:flex;gap:22px;justify-content:center;align-items:flex-start}
.dwrap{position:relative}
.dlabel{position:absolute;top:-24px;left:2px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.45);border-radius:4px;padding:2px 7px;letter-spacing:.3px;white-space:nowrap}
.card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.22);padding:24px;width:440px}
.dh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dtitle{font-size:15px;font-weight:700;color:#16191d}
.dbody{font-size:12px;color:#6b7280;margin:0 0 16px;line-height:1.7}
.err{display:flex;gap:9px;align-items:flex-start;padding:11px 13px;border:1px solid #f5c2bd;background:#fdecea;border-radius:9px;color:#b42318;font-size:12px;line-height:1.6;margin:0 0 16px}
.field{margin-bottom:14px}
.flabel{display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:5px}
.inp{width:100%;height:38px;border:1px solid #e6e8eb;border-radius:8px;background:#fbfbfc;padding:0 12px;font-size:13px;font-family:inherit;color:#16191d}
.inperr{border-color:#d92d20;background:#fff}
.row{display:flex;gap:10px;justify-content:flex-end}
.btn{height:38px;padding:0 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cancel{border:1px solid #e6e8eb;background:#fff;color:#3a3f46}
.primary{border:none;background:#5e6ad2;color:#fff;font-weight:700}
</style></head><body><div id="wrap">
<div class="ov">
  <div class="dwrap">
    <div class="dlabel">再認証ダイアログ（通常）</div>
    <div class="card">
      <div class="dh"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5e6ad2" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><span class="dtitle">本人確認</span></div>
      <p class="dbody">この操作には本人確認が必要です。続けるには現在のパスワードを入力してください。</p>
      <div class="field"><label class="flabel">現在のパスワード</label><input class="inp" type="password" value="••••••••" style="letter-spacing:2px"></div>
      <div class="row"><button class="btn cancel">キャンセル</button><button class="btn primary">確認</button></div>
    </div>
  </div>
  <div class="dwrap">
    <div class="dlabel">再認証ダイアログ（エラー）</div>
    <div class="card">
      <div class="dh"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5e6ad2" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><span class="dtitle">本人確認</span></div>
      <p class="dbody">この操作には本人確認が必要です。続けるには現在のパスワードを入力してください。</p>
      <div class="err"><span>パスワードが正しくありません</span></div>
      <div class="field"><label class="flabel">現在のパスワード</label><input class="inp inperr" type="password" value="••••" style="letter-spacing:2px"></div>
      <div class="row"><button class="btn cancel">キャンセル</button><button class="btn primary">確認</button></div>
    </div>
  </div>
</div>
</div></body></html>
