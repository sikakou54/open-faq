<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:#3a3f46;-webkit-font-smoothing:antialiased}
#wrap{display:inline-block}
.ov{background:rgba(16,24,40,.35);padding:34px 28px 28px;display:flex;gap:22px;justify-content:center;align-items:flex-start}
.dwrap{position:relative}
.dlabel{position:absolute;top:-24px;left:2px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.45);border-radius:4px;padding:2px 7px;letter-spacing:.3px;white-space:nowrap}
.card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.22);padding:24px;width:440px}
.dh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dtitle{font-size:15px;font-weight:700;color:#16191d}
.dbody{font-size:12px;color:#6b7280;margin:0 0 16px;line-height:1.7}
.warn{display:flex;gap:9px;align-items:flex-start;padding:11px 13px;border:1px solid #f5c2bd;background:#fdecea;border-radius:9px;color:#b42318;font-size:12px;line-height:1.6;margin:0 0 16px}
.field{margin-bottom:14px}
.flabel{display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:5px}
.inp{width:100%;height:38px;border:1px solid #e6e8eb;border-radius:8px;background:#fbfbfc;padding:0 12px;font-size:13px;font-family:inherit;color:#16191d}
.code{font-family:ui-monospace,Menlo,monospace;color:#b42318;background:#fdecea;padding:1px 5px;border-radius:4px}
.row{display:flex;gap:10px;justify-content:flex-end}
.btn{height:38px;padding:0 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cancel{border:1px solid #e6e8eb;background:#fff;color:#3a3f46}
.primary{border:none;background:#5e6ad2;color:#fff;font-weight:700}
.danger{border:none;background:#d92d20;color:#fff;font-weight:700}
</style></head><body><div id="wrap">
<div class="ov">
  <div class="dwrap">
    <div class="dlabel">L3 確認(公開キー再発行)</div>
    <div class="card">
      <div class="dh"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b42318" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 4 2.5 18a1.7 1.7 0 0 0 1.5 2.6h16a1.7 1.7 0 0 0 1.5-2.6L13.7 4a1.7 1.7 0 0 0-3 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg><span class="dtitle">公開キーを再発行</span></div>
      <div class="warn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b42318" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;margin-top:1px"><path d="M10.3 4 2.5 18a1.7 1.7 0 0 0 1.5 2.6h16a1.7 1.7 0 0 0 1.5-2.6L13.7 4a1.7 1.7 0 0 0-3 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg><span>既存の埋め込みコードは、旧キーの失効(24時間後)以降に動作しなくなります。</span></div>
      <p class="dbody">再発行するにはプロジェクト名の入力と本人確認が必要です。</p>
      <div class="field">
        <label class="flabel">確認のためプロジェクト名 <span class="code">Acme Support</span> を入力</label>
        <input class="inp" type="text" placeholder="Acme Support">
      </div>
      <div class="field">
        <label class="flabel">パスワードを再入力(本人確認)</label>
        <input class="inp" type="password" value="••••••••" style="letter-spacing:2px">
      </div>
      <div class="row"><button class="btn cancel">キャンセル</button><button class="btn danger">再発行する</button></div>
    </div>
  </div>
</div>
</div></body></html>
