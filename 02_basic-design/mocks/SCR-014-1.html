<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:#3a3f46;-webkit-font-smoothing:antialiased}
#wrap{display:inline-block}
.scr-mock,.screen{background:#fff}
.le-cap{font-size:12px;font-weight:700;color:#16191d;margin:0 0 8px}
.screen{border:1px solid #e6e8eb;border-radius:12px;overflow:hidden;width:1024px}
.screen-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fbfbfc;border-bottom:1px solid #eef0f2;font-size:12px}
.scr-name{font-weight:700;color:#16191d}.scr-user{color:#8a9099;font-size:11px}
.modal-overlay{background:rgba(16,24,40,.35);padding:28px;display:flex;justify-content:center}
.modal-card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(16,24,40,.18);padding:22px}
.panel{border:1px solid #eef0f2;border-radius:9px;padding:12px;margin:10px 0;background:#fbfbfc}
.panel-title{font-weight:700;font-size:12px;margin-bottom:6px}
.field{margin:10px 0;font-size:12px}.req{color:#e5484d}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.primary{background:#5e6ad2;color:#fff}
.link{color:#5e6ad2;text-decoration:none}
input[type=checkbox]{transform:translateY(1px)}
table{border-collapse:collapse}
</style>

</head><body><div id="wrap"><div style="background:#f5f6f8;padding:24px;border-radius:12px;font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;color:#3a3f46;--accent:#5e6ad2;--row-pad:14px"><div style="max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:28px"><section style="flex:none;width:380px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:13px"><span style="font-size:11px;font-weight:700;color:#b42318;background:#fdecea;border-radius:6px;padding:3px 8px">SCR-014</span><span style="font-size:13.5px;font-weight:600;color:#16191d">退会申請(危険操作)</span></div>
      <div style="background:#fff;border:1px solid #e6e8eb;border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.05);overflow:hidden">
        <div style="display:flex;align-items:center;height:54px;padding:0 16px;border-bottom:1px solid #eef0f2"><span style="display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:#16191d"><span style="width:23px;height:23px;border-radius:7px;background:var(--accent,#5e6ad2);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800">o</span>open-faq</span></div>
        <div style="padding:22px">
          <nav style="display:flex;align-items:center;gap:7px;font-size:12px;color:#9aa0a8;margin-bottom:14px"><span>設定</span><span>/</span><span style="color:#3a3f46">退会</span></nav>
          <h1 style="margin:0 0 10px;font-size:18px;font-weight:700;color:#16191d">契約を退会する</h1>
          <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid #f5c2bd;background:#fdecea;border-radius:10px;color:#b42318;font-size:12px;line-height:1.6;margin-bottom:18px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:1px"><path d="M10.3 4 2.5 18a1.7 1.7 0 0 0 1.5 2.6h16a1.7 1.7 0 0 0 1.5-2.6L13.7 4a1.7 1.7 0 0 0-3 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg><span>すべてのプロジェクト・FAQ・メンバー・利用履歴が完全に削除されます。<b>この操作は取り消せません。</b></span></div>
          <label style="display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:6px">確認のため契約名 <b style="font-family:ui-monospace,Menlo,monospace;color:#b42318">Acme Inc.</b> を入力</label>
          <div style="height:40px;border:1px solid #e6e8eb;border-radius:8px;background:#fff;display:flex;align-items:center;padding:0 12px;font-size:13px;color:#16191d;margin-bottom:14px">Acme Inc.</div>
          <label style="display:block;font-size:12px;font-weight:600;color:#3a3f46;margin-bottom:6px">パスワードを再入力(再認証)</label>
          <div style="height:40px;border:1px solid #e6e8eb;border-radius:8px;background:#fbfbfc;display:flex;align-items:center;padding:0 12px;font-size:13px;letter-spacing:2px;color:#b5bac0;margin-bottom:18px">••••••••</div>
          <button style="width:100%;height:44px;border:none;border-radius:9px;background:#d92d20;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">退会を申請する</button>
          <button style="width:100%;height:40px;margin-top:8px;border:1px solid #e6e8eb;border-radius:9px;background:#fff;color:#3a3f46;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">キャンセル</button>
        </div>
      </div>
    </section></div></div></div></body></html>
